<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lochquarry Welcome</title>

</head>
<body>

    <div class="welcome-section" style="text-align: center; padding: 20px;">
    <h1><span id="typed"></span></h1>
    </div>
   <script>
  var typed = new Typed("#typed", {
    strings: [
        "Thank you for visiting!", 
        "We look forward to your booking...", 
    ],
    typeSpeed: 50,
    backSpeed: 30,
    loop: true
  });
</script>
</script>
</body>
</html>
